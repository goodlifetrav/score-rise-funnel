<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bureau Blackout System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #141C2F; }
        .action-btn { background-color: #2563EB; transition: all 0.2s; }
        .action-btn:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        .script-card { border-left: 4px solid #60A5FA; background-color: #f1f5f9; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold mb-4">Secondary Bureau Blackout</h1>
            <p class="text-slate-600">Freeze these bureaus to stop data verification.</p>
        </header>

        <div id="bureau-list" class="space-y-6">
            </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 bg-black text-white px-6 py-3 rounded-lg opacity-0 transition-opacity duration-300 pointer-events-none">
        Copied to clipboard!
    </div>

    <script>
        const bureaus = [
            {
                name: "LEXISNEXIS",
                url: "https://consumer.risk.lexisnexis.com/freeze",
                script: "I am requesting a security freeze on my consumer report under the FCRA. My info: [Full Name], [SSN], [Address]."
            },
            {
                name: "SAGESTREAM",
                url: "https://www.sagestreamllc.com/security-freeze/",
                script: "I am requesting a security freeze on my SageStream/Invisis file immediately. Info: [Full Name], [SSN], [Address]."
            },
            {
                name: "INNOVIS",
                url: "https://www.innovis.com/securityFreeze/index",
                script: "Please place a security freeze on my Innovis credit report. Details: [Full Name], [SSN], [Address]."
            },
            {
                name: "ARS",
                url: "https://www.ars-consumertools.com/",
                script: "I am exercising my rights under the FCRA to freeze my report with ARS. Info: [Full Name], [SSN], [Address]."
            }
        ];

        function render() {
            const container = document.getElementById('bureau-list');
            container.innerHTML = bureaus.map((b, i) => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4">${b.name}</h2>
                    <a href="${b.url}" target="_blank" class="action-btn text-white px-6 py-2 rounded-lg font-bold inline-block mb-4 text-sm">
                        Open Freeze Portal
                    </a>
                    <div class="script-card p-4 rounded-r-lg">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold text-slate-400 uppercase">The Script</span>
                            <button onclick="copyText(${i})" class="text-xs font-bold text-blue-600 hover:underline">COPY SCRIPT</button>
                        </div>
                        <p class="text-sm text-slate-700 leading-relaxed italic">"${b.script}"</p>
                    </div>
                </div>
            `).join('');
        }

        async function copyText(index) {
            const text = bureaus[index].script;
            try {
                await navigator.clipboard.writeText(text);
                showToast();
            } catch (err) {
                // Fallback for older browsers
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                showToast();
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        window.onload = render;
    </script>
</body>
</html>
